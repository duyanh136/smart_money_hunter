            en: "Business type"
        callbackPoint:
          type: number
          example: "0.1"
          description:
            vi: |
              Note: Sử dụng trong lệnh điều kiện Stop order
              
              Chỉ hiển thị khi orderType ='TSO'
        
              Biên trượt (Ví dụ 0/1)
            en: |
              Note: Used in Stop order condition
              
              Only displayed when orderType ='TSO'
        
              Trailing step (e.g., 0/1)
        activationPrice:
          type: number
          example: "1505.7"
          description:
            vi: |
              Note: Sử dụng trong lệnh điều kiện Stop order
              
