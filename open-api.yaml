      tags:
        - authen
      summary:
        vi: 2.1.1. Trao đổi API Key để lấy JWT Token
        en: 2.1.1. Exchange API Key for JWT Token
      description: ''
      x-hideTryItPanel: false
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequestDto'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/TokenResponseDto"
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/TokenResponseErrorDto"
