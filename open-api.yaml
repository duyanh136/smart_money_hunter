            en: Sub account derivative
          required: true
          schema:
            type: string
            example: "105C031402A"
        - name: getType
          in: query
          description:
            vi: |
              - `0`: Lấy toàn bộ
              - `1`: Chỉ lấy tiền
            en: |
              - `0`: Get all
              - `1`: Only money
