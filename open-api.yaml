          content:
            application/json:
              schema:
                type: object
                properties:
                  cmd:
                    type: string
                    example: "Web.Portfolio.AccountStatus"
                    description:
                      vi: "Loại bút toán"
                      en: "Business type"
                  rc:
                    type: string
                    example: "1"
                    description: "1: success, < 0: error"
                  rs:
                    type: string
                    example:
                    description: "Chi tiết lỗi"
