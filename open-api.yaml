          type: string
          example: "B"
          description:
            vi: "Chiều mua (Buy) và bán (Sell), chỉ nhận giá trị B/S"
            en: "Accept only B (for buy) or S (for sell)"
        symbol:
          type: string
          example: "VN30F2110"
          description:
            vi: "Mã phái sinh"
            en: "Derivative code"
