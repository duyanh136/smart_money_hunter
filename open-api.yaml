tags:
  - name: workflow_diagram
    description:
      vi: >
        ![Sequence Diagram](../image/openapi.png)
  
        ### Đăng ký sử dụng iFlash Open API
  
        - Đối tác vui lòng liên hệ TCBS để đăng ký dịch vụ và nhận cặp khóa bí mật Client Id và Client Secret. (Liên hệ TCBS để biết thêm chi tiết).
  
        ### Đăng ký lấy API Key
  
        - Menu trái --> Tiện ích --> iFlash Open API
  
        - URL: https://tcinvest.tcbs.com.vn/iflash-open-api
  
        ![Register API Key](../image/register_apikey.png)
  
        ![Show API Key](../image/show_apikey.png)
  
        ### Lấy Token
  
        - Khách hàng sử dụng API Key đã lấy ở mục 1.1 + iOTP để lấy Token sử dụng khi call các API nghiệp vụ
  
        ### Thời gian hiệu lực của Mã truy cập (Access Token) là bao lâu?
  
        - Mã truy cập (Access Token) có hiệu lực tối đa 8 giờ kể từ khi nhận được xác thực iOTP từ ứng dụng TCInvest. Khi Mã truy cập hết hạn, Quý khách cần lấy Mã truy cập mới để đảm bảo việc sử dụng không bị gián đoạn.
  
        ### Huỷ API Key
  
        ![Show API Key](../image/revoke_apikey.png)

      en: >
        ![Sequence Diagram](../image/openapi.png)
  
        ### Register for iFlash Open API Usage
  
        - Contact TCBS to register for the service and receive the Client Id and Client Secret key pair. (For more details, contact TCBS).
  
        ### Register to Get API Key
  
        - Left menu --> Utilities --> iFlash Open API
  
        - URL: https://tcinvest.tcbs.com.vn/iflash-open-api
  
        ![Register API Key](../image/register_apikey_en.png)
  
        ![Show API Key](../image/show_apikey_en.png)
  
        ### Get Token
  
        - Customers use the API Key obtained in section 1.1 + iOTP to get a Token for calling business APIs.
  
        ### How long does the Access Token last?
  
        - The Access Token is valid for up to 8 hours from the time iOTP authentication is received through the TCInvest app. Once the Access Token expires, a new one must be obtained to ensure uninterrupted access.
  
        ### Revoke API Key
  
        ![Show API Key](../image/revoke_apikey_en.png)
