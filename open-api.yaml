            en: "Derivative code"
        price:
          type: number
          format: float
          example: "1198.7"
          description:
            vi: |
              Giá đặt (chặn trong khoảng trần sàn)
        
              Báo lỗi: Giá phải nằm trong khoảng trần sàn
            en: |
              Order price (within floor-ceiling range)
        
              Error message: Price must be within the floor-ceiling range
        volume:
