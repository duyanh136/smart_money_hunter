            en: "Not used"
        refId:
          type: string
          example: "H.OWsC4418qYN59HXcvGtD3z"
          description:
            vi: |
              Số ngẫu nhiên duy nhất xác định kênh đặt lệnh
        
              Theo định dạng: H.số tự sinh theo thứ tự
            en: |
              Unique random number identifying the order channel
        
              Format: H.sequence-generated number
        orderType:
          type: string
          example: "0"
          description:
            vi: |
              - `0`: đặt lệnh thường
              - `SLP=1.0,0.8`: stop loss khi giá lệch 1.0, take profit khi giá lệch 0.8  
              - `ABI=mã HĐTL`: đặt lệnh đối ứng, mã HĐTL là mã user chọn tại trường "Chọn hợp đồng"
            en: |
              - `0`: regular order
              - `SLP=1.0,0.8`: stop loss at 1.0 price deviation, take profit at 0.8 price deviation  
              - `ABI=contract code`: arbitrage order, contract code is selected by the user in the "Select contract" field
