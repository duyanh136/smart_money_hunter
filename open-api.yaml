#file: noinspection YAMLSchemaValidation
openapi: 3.1.0
info:
  title: iFlash Open API
  description:
    vi: >
      Chào mừng bạn đến với tài liệu kỹ thuật iFlash Open API. Nếu có bất kỳ câu hỏi nào, vui lòng liên hệ qua email.
      
      
      Ngôn ngữ: <button id="btn-vi" type="button">Tiếng Việt</button> <button id="btn-en" type="button">English</button>
    en: >
      Welcome to the iFlash Open API technical documentation. If you have any questions, please feel free to contact us via email.
      
      
      Language: <button id="btn-vi" type="button">Tiếng Việt</button> <button id="btn-en" type="button">English</button>
  version: 1.0.0
  contact:
    email: cskh@tcbs.com.vn
    url: 'https://developers.tcbs.com.vn'
  x-logo:
    url: '/image/logo.png'
    altText: Tcbs logo

servers:
  - url: 'https://openapi.tcbs.com.vn'
    description: Production
  - url: 'https://openapisit.tcbs.com.vn'
    description: SIT
