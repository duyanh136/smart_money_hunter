        volume:
          type: number
          example: "300"
          description:
            vi: "Số lượng, lớn hơn 0"
            en: "Quantity, greater than 0"
        advance:
          type: string
          example: ""
          description:
            vi: "Chưa dùng"
            en: "Not used"
        refId:
          type: string
          example: ""
          description:
            vi: "Số chống trùng theo từng lệnh"
            en: "Unique ID"
        orderType:
          type: string
          example: "SOL"
          description:
            vi: |
              Lệnh điều kiện Stoporder: 
              - `SOU`: Đặt lệnh khi giá thị trường <= "gia thi truong"
              - `SOL`: Đặt lệnh khi giá thị trường >= "gia thi truong"
              
              Lệnh TrailingStop: TSO
            en: |
              Conditional Stop order: 
              - `SOU`: Place order when market price <= "market price"
              - `SOL`: Place order when market price >= "market price"
              
              TrailingStop order: TSO
        pin:
          type: string
          example: ""
          description:
            vi: "Kênh đặt lệnh"
            en: "Order channel"
